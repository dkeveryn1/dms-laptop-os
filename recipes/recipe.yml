name: dms-laptop-os
description: Official DMS Experience on uBlue F43
base-image: ghcr.io/ublue-os/base-main
image-version: 43

modules:
  - type: files
    files:
      - source: /usr
        destination: /usr

  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/avengemedia/danklinux/repo/fedora-43/avengemedia-danklinux-fedora-43.repo
      - https://copr.fedorainfracloud.org/coprs/avengemedia/dms/repo/fedora-43/avengemedia-dms-fedora-43.repo
      - https://copr.fedorainfracloud.org/coprs/ashbuk/Hyprland-Fedora/repo/fedora-43/ashbuk-Hyprland-Fedora-fedora-43.repo
      - https://copr.fedorainfracloud.org/coprs/agonie/swww/repo/fedora-43/agonie-swww-fedora-43.repo
      - https://copr.fedorainfracloud.org/coprs/atim/starship/repo/fedora-43/atim-starship-fedora-43.repo 
      - https://copr.fedorainfracloud.org/coprs/ferdiu/libfprint-tod/repo/fedora-43/ferdiu-libfprint-tod-fedora-43.repo
    install:
      - dms
      - dgop
      - hyprland
      - greetd
      - dms-greeter
      - quickshell 
      - xorg-x11-server-Xwayland
      - adw-gtk3-theme
      - matugen
      - cava
      - qt6-qtwayland
      - qt6-qtdeclarative
      - qt6ct
      - qt6-qtmultimedia
      - qt6-qtshadertools
      - qt6-qtimageformats
      - kf6-kimageformats
      - jemalloc 
      - nemo
      - nemo-fileroller
      - nemo-terminal
      - nemo-preview
      - kitty
      - zsh
      - zsh-autosuggestions
      - zsh-syntax-highlighting
      - xdg-desktop-portal-hyprland 
      - xdg-desktop-portal-gtk      
      - gnome-keyring               
      - power-profiles-daemon
      - cups
      - accountsservice
      - grim
      - slurp
      - playerctl
      - swww
      - rsms-inter-fonts
      - khal
      - cups-pk-helper
      - fprintd 
      - fprintd-pam
      - jq
      - tailscale
      - lxqt-policykit
      - imv
      - xdg-user-dirs
      - steam-devices
      - starship
      - swappy
      - libfprint-tod

  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - io.github.kolunmi.Bazaar    
          - dev.zed.Zed                 
          - app.zen_browser.zen 
          - com.valvesoftware.Steam
          - com.moonlight_stream.Moonlight
          - com.github.tchx84.Flatseal  
          - io.github.celluloid_player.Celluloid
          - org.videolan.VLC
          - org.libreoffice.LibreOffice
          - me.proton.Mail
          - io.missioncenter.MissionCenter


  - type: script
    scripts:
      - permissions.sh

  - type: fonts
    fonts:
      nerd-fonts:
        - JetBrainsMono

  - type: systemd
    system:
      enabled:
        - greetd.service
        - tailscaled.service
    user:
      enabled:
        - dms.service
