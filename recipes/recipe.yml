name: dms-laptop-os
description: Official DMS Experience on uBlue F43
base-image: ghcr.io/ublue-os/base-main
image-version: 43

modules:
  - type: files
    files:
      - usr: /usr

  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/avengemedia/danklinux/repo/fedora-43/avengemedia-danklinux-fedora-43.repo
      - https://copr.fedorainfracloud.org/coprs/avengemedia/dms/repo/fedora-43/avengemedia-dms-fedora-43.repo
    install:
      # The Dank Suite (Replicates the curl installer packages)
      - dms
      - dankinstall
      - dgop
      - dsearch
      
      # Core DE & Native Login Manager
      - hyprland
      - greetd
      - dms-greeter
      - quickshell 
      - xorg-x11-server-Xwayland
      - adw-gtk3-theme

      # Full DMS Integrations
      - matugen
      - cava
      - qt6ct
      - qt6-qtmultimedia
      
      # Preferred Local Apps
      - nemo
      - nemo-fileroller
      - kitty
      
      # Hardware & System Daemons
      - xdg-desktop-portal-hyprland 
      - xdg-desktop-portal-gtk      
      - gnome-keyring               
      - brightnessctl
      - network-manager-applet
      - blueman
      - polkit-gnome
      - wl-clipboard
      - power-profiles-daemon
      - fira-code-nerd-font
      - cups

  # Execute the official installer logic non-interactively
  - type: script
    snippets:
      - |
        # Generate the configs for Hyprland and Kitty
        dms setup --compositor hyprland --terminal kitty
        
        # Move the generated configs to the system skeleton
        mkdir -p /usr/etc/skel/.config
        cp -r /root/.config/dms /usr/etc/skel/.config/
        cp -r /root/.config/hypr /usr/etc/skel/.config/
        cp -r /root/.config/kitty /usr/etc/skel/.config/
        
        # Inject the hardware source link into the newly generated master config
        echo "source = ~/.config/hypr/laptop.conf" >> /usr/etc/skel/.config/hypr/hyprland.conf

  - type: default-flatpaks
    system:
      repo-url: https://dl.flathub.org/repo/flathub.flatpakrepo
      repo-name: flathub
      install:
        - io.github.kolunmi.Bazaar    
        - dev.zed.Zed                 
        - app.zen_browser.zen         

  - type: systemd
    system:
      enabled:
        - greetd.service
        - dsearch.service # Enables the background daemon for the launcher
