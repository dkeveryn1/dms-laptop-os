name: dms-laptop-os
description: Official DMS Experience on uBlue F42
base-image: ghcr.io/ublue-os/base-main
image-version: 42

modules:
  - type: files
    files:
      - usr: /usr

  - type: rpm-ostree
    repos:
      - https://copr.fedorainfracloud.org/coprs/avengemedia/danklinux/repo/fedora-42/avengemedia-danklinux-fedora-42.repo
      - https://copr.fedorainfracloud.org/coprs/avengemedia/dms/repo/fedora-42/avengemedia-dms-fedora-42.repo
      - https://copr.fedorainfracloud.org/coprs/solopasha/hyprland/repo/fedora-42/solopasha-hyprland-fedora-42.repo
    install:
      - dms
      - dgop
      - hyprland
      - hyprland-qtutils
      - greetd
      - dms-greeter
      - quickshell 
      - xorg-x11-server-Xwayland
      - adw-gtk3-theme
      - matugen
      - cava
      - qt6-qtwayland
      - qt6-qtdeclarative
      - qt6ct
      - qt6-qtmultimedia
      - nemo
      - nemo-fileroller
      - kitty
      - xdg-desktop-portal-hyprland 
      - xdg-desktop-portal-gtk      
      - gnome-keyring               
      - brightnessctl
      - lxqt-policykit
      - wl-clipboard
      - power-profiles-daemon
      - fira-code-fonts
      - cups
      - accountsservice
      - grim
      - slurp
      - playerctl
      - swww

  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - io.github.kolunmi.Bazaar    
          - dev.zed.Zed                 
          - app.zen_browser.zen         

  - type: systemd
    system:
      enabled:
        - greetd.service
