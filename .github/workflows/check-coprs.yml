name: Check Fedora 44 COPR Readiness
on:
  schedule:
    - cron: '0 12 * * *' # Runs every day at 12:00 PM UTC
  workflow_dispatch: # Allows you to run it manually via the website

permissions:
  issues: write

jobs:
  check-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Ping COPRs
        id: check
        run: |
          # Use an if-statement so the script exits successfully even if a 404 is hit
          if curl -sf -o /dev/null "https://copr.fedorainfracloud.org/coprs/avengemedia/danklinux/repo/fedora-44/avengemedia-danklinux-fedora-44.repo" && \
             curl -sf -o /dev/null "https://copr.fedorainfracloud.org/coprs/avengemedia/dms/repo/fedora-44/avengemedia-dms-fedora-44.repo" && \
             curl -sf -o /dev/null "https://copr.fedorainfracloud.org/coprs/nett00n/hyprland/repo/fedora-44/nett00n-hyprland-fedora-44.repo" && \ 
             curl -sf -o /dev/null "https://copr.fedorainfracloud.org/coprs/ferdiu/libfprint-tod/repo/fedora-44/ferdiu-libfprint-tod-fedora-44.repo"; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
          
      - name: Alert when Ready
        if: steps.check.outputs.ready == 'true' # Only runs if the above script output true
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "🚀 All COPRs are Ready for Fedora 44!",
              body: "Update your recipe.yml to image-version: 44. Every single maintainer has successfully built their packages."
            })
