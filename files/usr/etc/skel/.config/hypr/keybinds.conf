$mainMod = SUPER

# Core Window Management
bind = $mainMod, ENTER, exec, kitty
bind = $mainMod, Q, killactive, 
bind = $mainMod SHIFT, M, exit,
bind = $mainMod, F, exec, nemo
bind = $mainMod, SPACE, togglefloating, 

# DankMaterialShell Official Default Keybinds
bind = $mainMod, A, exec, dms ipc call spotlight toggle
bind = $mainMod, V, exec, dms ipc call clipboard toggle
bind = $mainMod, M, exec, dms ipc call processlist focusOrToggle
bind = $mainMod, comma, exec, dms ipc call settings focusOrToggle
bind = $mainMod, N, exec, dms ipc call notifications toggle
bind = $mainMod, W, exec, dms ipc call dankdash wallpaper
bind = $mainMod ALT, L, exec, dms ipc call lock lock

# Applications
bind = $mainMod, B, exec, flatpak run app.zen_browser.zen
bind = $mainMod, T, exec, flatpak run dev.zed.Zed

# Screenshots
bind = , Print, exec, dms screenshot full
bind = $mainMod, S, exec, dms screenshot
