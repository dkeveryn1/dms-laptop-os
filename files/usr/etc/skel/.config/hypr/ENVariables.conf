# Environment Variables (Cursor & Theming Fixes)
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QUICK_CONTROLS_STYLE,org.hyprland.style
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = GDK_BACKEND,wayland,x11,*
env = CLUTTER_BACKEND,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# --- Default Applications (For CLI & Scripts) ---
env = TERMINAL,kitty
env = FILEMANAGER,nemo
env = EDITOR,nano
env = VISUAL,nano
env = BROWSER,flatpak run app.zen_browser.zen
env = IMAGE_VIEWER,imv
env = VIDEO_PLAYER,flatpak run io.github.celluloid_player.Celluloid

env = XDG_DATA_DIRS,/var/lib/flatpak/exports/share:/home/dkeveryn/.local/share/flatpak/exports/share:/usr/share:/usr/local/share
