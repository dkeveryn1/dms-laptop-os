# --- Core UI Theme & Visuals ---

# 1. Source the dynamic Matugen colors generated by DMS
# (Ensure this path matches where DMS outputs your Hyprland colors, usually in ~/.cache or ~/.config/hypr)
source = ~/.config/hypr/colors.conf 

general {
    border_size = 2
    gaps_in = 4
    gaps_out = 8

    # Use Matugen's Material 3 variables instead of Pywal
    col.active_border = $primary
    col.inactive_border = $surfaceVariant
}

decoration {
    rounding = 10

    # Adjusted opacity for better readability on laptops
    active_opacity = 1.0
    inactive_opacity = 0.95
    fullscreen_opacity = 1.0

    dim_inactive = true
    dim_strength = 0.1
    dim_special = 0.8

    shadow {
        enabled = true
        range = 4
        render_power = 3
        # Tie the shadow glow to your dynamic wallpaper color
        color = $primary
        color_inactive = rgba(00000044)
    }

    # Jakoolit's Heavy Eye-Candy Blur
    blur {
        enabled = true
        size = 6
        passes = 3
        xray = true
        ignore_opacity = true
        special = true
        popups = true
    }
}

group {
    col.border_active = $primary

    groupbar {
        col.active = $primaryContainer
    }
}
