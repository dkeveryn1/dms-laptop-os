# Force global dark mode for all GTK4, Libadwaita, and Flatpak applications
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'

# Automatically generate the Downloads, Documents, Pictures, etc. folders and config files
exec-once = xdg-user-dirs-update

exec-once = dms run --session
exec-once = lxqt-policykit-agent
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = quickshell -c widgets
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = pkill xdg-desktop-portal; pkill xdg-desktop-portal-hyprland; pkill xdg-desktop-portal-gtk
exec-once = /usr/libexec/xdg-desktop-portal-hyprland & sleep 2 && /usr/libexec/xdg-desktop-portal-gtk & sleep 2 && /usr/libexec/xdg-desktop-portal &

# Push the Flatpak paths into systemd
exec-once = systemctl --user import-environment XDG_DATA_DIRS

# Restart DMS so it launches with the new paths
exec-once = systemctl --user restart dms.service

exec-once = flatpak run dev.deedles.Trayscale --hide-window
exec-once = sleep 10 && flatpak run com.nextcloud.desktopclient.nextcloud --backgroun

