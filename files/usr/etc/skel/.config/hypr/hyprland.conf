# Source Modular Files
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/laptop.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/windowrules.conf

# Core UI Rules
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee)
    layout = master
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

decoration {
    rounding = 10
    blur {
        enabled = true
}

input {
    kb_layout = us
    follow_mouse = 1
}
