# --- DMS Master Config (Fully Provisioned) ---

# 1. Source Modular Files
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/ENVariables.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/SystemSettings.conf
source = ~/.config/hypr/laptop.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/animations.conf

# 2. Core UI Theme & Visuals
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(33ccffee)
    # Note: 'layout' and 'resize_on_border' are safely handled in settings.conf
}

decoration {
    rounding = 10
    blur {
        enabled = true
    }
}

