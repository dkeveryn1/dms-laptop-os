# --- Layout & Windows ---
general {
    resize_on_border = true
    layout = master
    allow_tearing = false  
}

# NEW IN 0.54: Layout-agnostic properties have been moved here
layout {
    empty_window_aspect_ratio = 1.0
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = slave
    new_on_top = false
    mfact = 0.5
    allow_small_split = true
    orientation = left
    smart_resizing = true
    drop_at_cursor = true
}

# NEW IN 0.54: The native scrolling layout (replaces hyprscroller)
scrolling {
    fullscreen_on_one_column = true
    column_width = 0.5
    focus_fit_method = 0
    follow_focus = true
    direction = right
}

# --- Laptop Keyboard & Trackpad ---
input {
    kb_layout = us
    repeat_rate = 50
    repeat_delay = 300
    numlock_by_default = true
    follow_mouse = 1

    touchpad {
        disable_while_typing = true
        natural_scroll = true 
        tap_to_click = true
        clickfinger_behavior = false
    }
}

# --- Laptop Trackpad Gestures ---
gestures {
    workspace_swipe = true
    workspace_swipe_distance = 300
    workspace_swipe_invert = true
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = true 
}

# --- System Behavior ---
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    enable_swallow = true
    swallow_regex = ^(kitty)$
    allow_session_lock_restore = true 
    initial_workspace_tracking = 0
}

# --- Legacy App Scaling Fix ---
xwayland {
    enabled = true
    force_zero_scaling = true
}

# --- Mouse Theme Sync ---
cursor {
    sync_gsettings_theme = true
}
